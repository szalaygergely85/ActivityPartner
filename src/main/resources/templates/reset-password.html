<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Reset Password - Vivento</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d7ff2",
                        "danger": "#ef4444",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0a0f14",
                        "card-dark": "#161e27",
                    },
                    fontFamily: { "display": ["Plus Jakarta Sans", "sans-serif"] },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>
<body class="font-display min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-lg bg-card-dark border border-gray-800 rounded-3xl overflow-hidden shadow-2xl">
    <div class="flex items-center justify-between p-6 pb-2">
        <a href="/" class="text-gray-400 hover:text-white transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-widest">Account Recovery</h2>
        <div class="w-6"></div>
    </div>

    <div class="p-6 pt-4 text-center">
        <!-- Success State -->
        <div id="success-message" class="hidden bg-green-500/10 border border-green-500/30 rounded-2xl p-5 mb-6 text-left">
            <div class="flex items-start gap-3">
                <span class="material-symbols-outlined text-green-500 text-xl shrink-0">check_circle</span>
                <div>
                    <h3 class="text-green-500 font-bold mb-1">Password Updated!</h3>
                    <p class="text-sm text-gray-300">Your password has been changed successfully. You can now log in with your new password.</p>
                </div>
            </div>
            <a href="/" class="mt-4 flex w-full cursor-pointer items-center justify-center rounded-xl h-12 px-5 bg-primary text-white font-bold hover:bg-primary/90 transition-all">
                Back to Home
            </a>
        </div>

        <!-- Error State (invalid/expired token) -->
        <div id="error-banner" class="hidden bg-red-500/10 border border-red-500/30 rounded-2xl p-4 mb-6 text-left">
            <div class="flex items-start gap-3">
                <span class="material-symbols-outlined text-red-400 text-xl shrink-0">error</span>
                <p id="error-text" class="text-sm text-gray-300"></p>
            </div>
        </div>

        <!-- Main Form -->
        <div id="main-content">
            <div class="mb-4 inline-flex h-16 w-16 items-center justify-center rounded-full bg-primary/10 text-primary">
                <span class="material-symbols-outlined text-4xl">lock_reset</span>
            </div>
            <h1 class="text-2xl font-extrabold text-white mb-2">Set New Password</h1>
            <p class="text-gray-400 text-sm mb-6">Enter a new password for your Vivento account.</p>

            <form id="reset-form" class="space-y-5 text-left">
                <input type="hidden" id="token" th:value="${token}"/>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider" for="new-password">New Password</label>
                    <input
                        class="w-full bg-background-dark border border-gray-700 rounded-xl h-14 px-4 text-white focus:border-primary focus:ring-primary placeholder:text-gray-600"
                        id="new-password"
                        type="password"
                        placeholder="At least 6 characters"
                        required
                        minlength="6"
                    />
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-wider" for="confirm-password">Confirm Password</label>
                    <input
                        class="w-full bg-background-dark border border-gray-700 rounded-xl h-14 px-4 text-white focus:border-primary focus:ring-primary placeholder:text-gray-600"
                        id="confirm-password"
                        type="password"
                        placeholder="Repeat your new password"
                        required
                    />
                </div>

                <!-- reCAPTCHA -->
                <div class="flex justify-center">
                    <div class="g-recaptcha"
                         th:attr="data-sitekey=${recaptchaSiteKey}"
                         data-theme="dark"></div>
                </div>

                <div class="pt-2">
                    <button
                        type="submit"
                        class="flex w-full cursor-pointer items-center justify-center rounded-xl h-14 px-5 bg-primary text-white gap-2 font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <span class="material-symbols-outlined">lock</span>
                        Update Password
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="p-4 text-center text-xs text-gray-600">
        &copy; 2026 Vivento. All rights reserved.
    </div>
</div>

<script>
    document.getElementById('reset-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const token = document.getElementById('token').value;
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (newPassword !== confirmPassword) {
            showError('Passwords do not match.');
            return;
        }
        if (newPassword.length < 6) {
            showError('Password must be at least 6 characters.');
            return;
        }

        const recaptchaToken = grecaptcha.getResponse();
        if (!recaptchaToken) {
            showError('Please complete the CAPTCHA.');
            return;
        }

        const submitButton = this.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        submitButton.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Updating...';

        try {
            const response = await fetch('/api/users/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword, recaptchaToken })
            });

            if (response.ok) {
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('error-banner').classList.add('hidden');
                document.getElementById('success-message').classList.remove('hidden');
            } else {
                const data = await response.json().catch(() => ({}));
                showError(data.message || 'This link is invalid or has expired. Please request a new one.');
                submitButton.disabled = false;
                submitButton.innerHTML = '<span class="material-symbols-outlined">lock</span> Update Password';
                grecaptcha.reset();
            }
        } catch (err) {
            showError('Network error. Please check your connection and try again.');
            submitButton.disabled = false;
            submitButton.innerHTML = '<span class="material-symbols-outlined">lock</span> Update Password';
            grecaptcha.reset();
        }
    });

    function showError(msg) {
        const banner = document.getElementById('error-banner');
        document.getElementById('error-text').textContent = msg;
        banner.classList.remove('hidden');
    }
</script>
</body>
</html>
